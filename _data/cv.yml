        summary: Computational materials science research spanning polymer-drug interactions, molecular simulation, and machine learning.
        highlights:
          - Performed molecular dynamics simulations on polymers, small molecules, and polymer-drug systems.
          - Investigated drug-polymer matching for anti-inflammatory delivery systems including PLGA, polyesteramides, and acetalated dextran.
          - Developed machine learning models including SVM, Random Forest, and LASSO for Hildebrand solubility parameter prediction.
          - Deployed machine learning workflows on the PolyDrug web platform for solubility and interaction-parameter prediction.
          - Taught data processing and machine learning to bachelor's and master's students.

